name: MemPalace Release Generator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_all:
    name: Build All Targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold Native Wrappers
        run: |
          flutter create --platforms=android,web,linux,windows,macos .
          
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/flutter.compileSdkVersion/35/g' android/app/build.gradle.kts
            sed -i 's/compileSdk = [0-9]*/compileSdk = 35/g' android/app/build.gradle.kts
          fi
          
          if [ -f android/app/build.gradle ]; then
            sed -i 's/flutter.compileSdkVersion/35/g' android/app/build.gradle
            sed -i 's/compileSdk = [0-9]*/compileSdk = 35/g' android/app/build.gradle
          fi
          
          # CRITICAL FIX: Inject Internet permission into the freshly generated release manifest
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Build Web
        run: flutter build web --release

      - name: Build Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mempalace-production-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/web/
            build/linux/x64/release/bundle/
