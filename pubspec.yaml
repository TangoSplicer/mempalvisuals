name: mempalace_ui
description: "Visual frontend for MemPalace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.1.0
  drift: 2.27.0
  drift_flutter: 0.2.6
  sqlite3_flutter_libs: ^0.5.2
  dio: ^5.4.3
  freezed_annotation: ^2.4.1
